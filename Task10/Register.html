<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .txt {
            width: 300px;
            padding: 5px;
            border-radius: 5px;
            border: 1px solid grey;
        }

        .btn {
            padding: 5px;
            background-color: white;
            border: 1px solid rgba(27, 87, 199, 0.74);
            border-radius: 5px;
            width: 100px;
        }

        .btn:hover {
            background-color: rgba(27, 87, 199, 0.74);
            border: 1px solid white;
            color: white;
            cursor: pointer;
        }

        a {
            text-decoration: none;
        }

        a:hover {
            color: red;
        }
    </style>
</head>

<body>
    <div style="width: 100%; display: flex; justify-content: center; align-items: center; margin: 30px;">
        <div style="width: 24%;">
            <fieldset style="border-radius: 10px; border:1px solid grey">
                <legend>
                    <h3>Registration Page</h3>
                </legend>
                <label>Name:</label>
                <input type="text" id="name" name="name" class="txt" placeholder="Enter Name" required>
                <br /><br />
                <label>Email:</label>
                <input type="email" name="email" class="txt" placeholder="Enter Email" required>
                <br /><br />
                <label>Password:</label>
                <input type="password" id="password" class="txt" placeholder="Enter Password" required>
                <br /><br />
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <button class="btn" type="submit" onclick="Submit()">Register</button>
                    <label>Already Registered? <a href="Login.html">Login</a></label>
                </div>
            </fieldset>
        </div>
    </div>

    <script>
        function Submit() {
            var name = document.getElementsByName("name")[0].value;
            var email = document.getElementsByName("email")[0].value;
            var password = document.getElementById("password").value;

            var data = localStorage.getItem("myObj");
            data = JSON.parse(data);
            if (data && data.Email == email) {
                alert("User already exists.")
                location = "Login.html";
            }
            else {
                var myObj = {
                    Name: name,
                    Email: email,
                    Password: password,
                }

                localStorage.setItem("myObj", JSON.stringify(myObj));
                location = "Login.html";
            }
        }
    </script>

</body>

</html>
